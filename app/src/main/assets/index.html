<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البحث عن السيرفر...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .radar-pulse { animation: radar 2s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes radar { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(3.5); opacity: 0; } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center">
    <div class="relative flex items-center justify-center mb-16">
        <div class="absolute w-20 h-20 bg-blue-500 rounded-full radar-pulse"></div>
        <div class="absolute w-20 h-20 bg-blue-400 rounded-full radar-pulse" style="animation-delay: 0.6s"></div>
        <div class="absolute w-20 h-20 bg-blue-300 rounded-full radar-pulse" style="animation-delay: 1.2s"></div>
        <div class="relative bg-white w-24 h-24 rounded-full flex items-center justify-center shadow-2xl border-4 border-slate-100 z-10 text-5xl">📡</div>
    </div>
    <h1 class="text-3xl font-black text-slate-800 mb-3 tracking-tight">جاري البحث عن العيادة</h1>
    <p class="text-slate-500 mb-10 text-center px-6 font-bold" id="status-text">يرجى التأكد من اتصالك بشبكة الواي فاي الخاصة بالعيادة</p>
    <div class="w-72 bg-slate-200 rounded-full h-3 overflow-hidden shadow-inner">
        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <script>
        const SERVER_PORT = 3000;
        const TARGET_FILE = "/logo.png";
        const SUBNETS = ['192.168.1', '192.168.0', '192.168.8', '10.0.0'];
        let totalIPs = SUBNETS.length * 254; let checkedIPs = 0; let serverFound = false;
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');

        function checkIP(ip) {
            return new Promise((resolve) => {
                if (serverFound) return resolve();
                const img = new Image(); const testUrl = `http://${ip}:${SERVER_PORT}`;
                img.onload = () => {
                    if (!serverFound) {
                        serverFound = true;
                        statusText.innerHTML = `<span class="text-emerald-600 font-black text-lg">تم العثور على النظام! جاري التوجيه...</span>`;
                        progressBar.style.width = '100%';
                        setTimeout(() => { window.location.href = `${testUrl}/doctor.html`; }, 1200);
                    }
                    resolve();
                };
                img.onerror = () => {
                    checkedIPs++;
                    if (!serverFound) progressBar.style.width = Math.min((checkedIPs / totalIPs) * 100, 100) + '%';
                    resolve();
                };
                img.src = `${testUrl}${TARGET_FILE}?rand=${Math.random()}`;
                setTimeout(() => { img.src = ""; resolve(); }, 2500);
            });
        }

        async function scanNetwork() {
            const scanPromises = [];
            for (let subnet of SUBNETS) {
                for (let i = 1; i <= 254; i++) {
                    if (serverFound) break;
                    scanPromises.push(checkIP(`${subnet}.${i}`));
                    if (i % 10 === 0) await new Promise(r => setTimeout(r, 20));
                }
            }
            await Promise.all(scanPromises);
            if (!serverFound) {
                statusText.innerHTML = `<span class="text-rose-500 font-bold">لم نتمكن من العثور على السيرفر!</span><br><span class="text-sm text-slate-400">تأكد من تشغيل الحاسوب الرئيسي ومن الواي فاي.</span><br><br><button onclick="location.reload()" class="bg-slate-800 text-white px-6 py-3 rounded-xl shadow-lg">إعادة البحث 🔄</button>`;
                progressBar.classList.replace('bg-blue-600', 'bg-rose-500');
            }
        }
        window.onload = () => { setTimeout(scanNetwork, 500); };
    </script>
</body>
</html>
